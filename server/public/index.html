<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Browser</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 30px auto;
        padding: 0 16px;
        color: #222;
      }
      h1 {
        font-size: 22px;
      }
      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        align-items: center;
      }
      select,
      button {
        padding: 6px 10px;
        font-size: 14px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 8px;
        border-bottom: 1px solid #ddd;
        font-size: 14px;
      }
      th {
        background: #f4f4f4;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 14px;
      }
      .muted {
        color: #777;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Product Browser</h1>
    <p class="muted">Browsing 200,000 products, newest first.</p>

    <div class="controls">
      <label for="category">Category:</label>
      <select id="category">
        <option value="">All</option>
      </select>
      <button id="restartBtn">Restart</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Created at</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <div class="footer">
      <span id="status" class="muted"></span>
      <button id="nextBtn">Next page &rarr;</button>
    </div>

    <script>
      // Plain JS, no frameworks - keeps it easy to read.

      let cursorCreatedAt = null;
      let cursorId = null;

      async function loadCategories() {
        const res = await fetch("/api/categories");
        const data = await res.json();
        const select = document.getElementById("category");
        data.categories.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c;
          opt.textContent = c;
          select.appendChild(opt);
        });
      }

      async function loadPage() {
        const category = document.getElementById("category").value;

        const params = new URLSearchParams();
        if (category) params.set("category", category);
        if (cursorCreatedAt && cursorId) {
          params.set("cursorCreatedAt", cursorCreatedAt);
          params.set("cursorId", cursorId);
        }

        const res = await fetch("/api/products?" + params.toString());
        const data = await res.json();

        const rows = document.getElementById("rows");
        data.products.forEach((p) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td>₹${p.price}</td>
        <td>${new Date(p.created_at).toLocaleString()}</td>
      `;
          rows.appendChild(tr);
        });

        document.getElementById("status").textContent =
          `Showing ${rows.children.length} products so far`;

        if (data.nextCursor) {
          cursorCreatedAt = data.nextCursor.cursorCreatedAt;
          cursorId = data.nextCursor.cursorId;
          document.getElementById("nextBtn").disabled = false;
        } else {
          document.getElementById("nextBtn").disabled = true;
          document.getElementById("nextBtn").textContent = "No more products";
        }
      }

      function restart() {
        cursorCreatedAt = null;
        cursorId = null;
        document.getElementById("rows").innerHTML = "";
        document.getElementById("nextBtn").disabled = false;
        document.getElementById("nextBtn").textContent = "Next page →";
        loadPage();
      }

      document.getElementById("nextBtn").addEventListener("click", loadPage);
      document.getElementById("restartBtn").addEventListener("click", restart);
      document.getElementById("category").addEventListener("change", restart);

      loadCategories();
      loadPage();
    </script>
  </body>
</html>
